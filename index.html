<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff0000">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-messaging.js"></script>
<script src="notif-helper.js"></script>
<script src="app-config.js"></script>

<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #22263a;
  --border: #2e3250;
  --accent: #f59e0b;
  --accent2: #3b82f6;
  --text: #e8eaf0;
  --muted: #7b82a0;
  --danger: #ef4444;
  --success: #22c55e;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Cairo', Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.login-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 28px 24px;
  width: 100%;
  max-width: 360px;
}

.login-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--accent);
  text-align: center;
  margin-bottom: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

label {
  display: block;
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 5px;
  font-weight: 600;
}

.field { margin-bottom: 14px; }

input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 12px;
  border-radius: 8px;
  font-family: 'Cairo', Arial, sans-serif;
  font-size: 14px;
  outline: none;
  transition: border-color .2s;
}
input:focus { border-color: var(--accent); }
input::placeholder { color: var(--muted); }

button {
  width: 100%;
  padding: 11px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-family: 'Cairo', Arial, sans-serif;
  font-size: 14px;
  font-weight: 700;
  transition: opacity .2s;
}
button:hover { opacity: .9; }

.btn-login {
  background: var(--accent);
  color: #1a1d27;
  margin-top: 6px;
}

.btn-test {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--muted);
  margin-top: 10px;
  font-weight: 600;
  font-size: 12px;
}
</style>

</head>
<body>

<div class="login-card">
  <div class="login-title">🔧 تسجيل الدخول</div>

  <div class="field">
    <label>اسم المستخدم</label>
    <input id="username" placeholder="Username">
  </div>

  <div class="field">
    <label>كلمة المرور</label>
    <input id="password" type="password" placeholder="Password">
  </div>

  <button class="btn-login" onclick="login()">دخول</button>
  <button class="btn-test" onclick="testLocalNotif()">🧪 اختبار محلي</button>
</div>

<script>
const EMAIL_DOMAIN = '@nahdetmisr.com';

const firebaseConfig = {
  apiKey:            'AIzaSyCk-sP0Z-TGyx1rcyQhXFR1D52BY-aLt1E',
  authDomain:        'maintenance-nahda.firebaseapp.com',
  projectId:         'maintenance-nahda',
  storageBucket:     'maintenance-nahda.firebasestorage.app',
  messagingSenderId: '1055981144653',
  appId:             '1:1055981144653:web:cecf0a83969248f7d12a04'
};

firebase.initializeApp(firebaseConfig);
const db   = firebase.firestore();
const auth = firebase.auth();

// تفعيل FCM فور فتح الصفحة
initFCM(db);

// لو فيه جلسة فايربيز حقيقية شغالة بالفعل، حوّل مباشرة بدون ما تطلب تسجيل دخول تاني
auth.onAuthStateChanged(user => {
  if (user && localStorage.getItem('role')) {
    location.href = REQUESTS_ENABLED ? 'request.html' : 'parts.html';
  }
});

async function login() {
  const loginBtn = document.querySelector('.btn-login');
  const u = document.getElementById('username').value.trim().toLowerCase();
  const p = document.getElementById('password').value.trim();

  if (!u || !p) { alert('اكتب اسم المستخدم وكلمة المرور ❌'); return; }

  loginBtn.disabled = true;
  loginBtn.textContent = 'بيدخل...';

  try {
    const email = u.includes('@') ? u : u + EMAIL_DOMAIN;
    const cred = await auth.signInWithEmailAndPassword(email, p);
    const uid = cred.user.uid;

    // جيب الدور والماكينة من Firestore (مفيش كلمة سر هنا خالص)
    const userDoc = await db.collection('users').doc(uid).get();

    if (!userDoc.exists) {
      alert('الحساب موجود بس مفيش بيانات صلاحيات مرتبطة بيه. كلّم المسؤول.');
      await auth.signOut();
      return;
    }

    const data = userDoc.data();
    localStorage.setItem('user', data.username || u);
    localStorage.setItem('role', 'user');
    localStorage.setItem('machine', data.machine || 'all');
    location.href = REQUESTS_ENABLED ? 'request.html' : 'parts.html';

  } catch (e) {
    console.error(e);
    if (e.code === 'auth/invalid-credential' || e.code === 'auth/user-not-found' || e.code === 'auth/wrong-password') {
      alert('بيانات غلط ❌');
    } else if (e.code === 'auth/too-many-requests') {
      alert('محاولات كتير غلط، حاول تاني بعد شوية ⏳');
    } else {
      alert('حصل خطأ غير متوقع، جرّب تاني');
    }
  } finally {
    loginBtn.disabled = false;
    loginBtn.textContent = 'دخول';
  }
}

document.querySelectorAll('input').forEach(inp =>
  inp.addEventListener('keypress', e => { if (e.key === 'Enter') login(); })
);

async function testLocalNotif() {
  const reg = await navigator.serviceWorker.getRegistration();
  if (!reg) { alert('Service Worker مش مسجّل'); return; }
  reg.showNotification('🧪 اختبار محلي', {
    body: 'الإشعارات المحلية شغّالة ✅',
    icon: '/icon-192.png',
    vibrate: [200,100,200]
  });
}

// install PWA
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
});
</script>
</body>
</html>
