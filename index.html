<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff0000">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-messaging.js"></script>
<script src="app-config.js"></script>

<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #22263a;
  --border: #2e3250;
  --accent: #f59e0b;
  --accent2: #3b82f6;
  --text: #e8eaf0;
  --muted: #7b82a0;
  --danger: #ef4444;
  --success: #22c55e;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Cairo', Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.login-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 28px 24px;
  width: 100%;
  max-width: 360px;
}

.login-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--accent);
  text-align: center;
  margin-bottom: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

label {
  display: block;
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 5px;
  font-weight: 600;
}

.field { margin-bottom: 14px; position: relative; }

input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 12px;
  border-radius: 8px;
  font-family: 'Cairo', Arial, sans-serif;
  font-size: 14px;
  outline: none;
  transition: border-color .2s;
}
input:focus { border-color: var(--accent); }
input::placeholder { color: var(--muted); }

/* تنسيق خاص لحقل الباسورد عشان أيقونة العين */
#password { padding-left: 35px; }
.toggle-password {
  position: absolute;
  left: 10px;
  top: 28px;
  cursor: pointer;
  font-size: 16px;
  opacity: 0.7;
  transition: opacity 0.2s;
  user-select: none;
}
.toggle-password:hover { opacity: 1; }

button {
  width: 100%;
  padding: 11px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-family: 'Cairo', Arial, sans-serif;
  font-size: 14px;
  font-weight: 700;
  transition: opacity .2s;
}
button:hover { opacity: .9; }

.btn-login {
  background: var(--accent);
  color: #1a1d27;
  margin-top: 6px;
}

.btn-install {
  background: var(--success);
  color: #fff;
  margin-top: 10px;
  display: none; /* مخفي لحد ما المتصفح يسمح بالتثبيت */
}

.btn-test {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--muted);
  margin-top: 10px;
  font-weight: 600;
  font-size: 12px;
}

#loading {
  text-align: center;
  color: var(--accent);
  font-weight: bold;
  font-size: 18px;
}
</style>

</head>
<body>

<div id="loading">
  ⏳ جاري التحقق من الحساب...
</div>

<div class="login-card" id="loginForm" style="display: none;">
  <div class="login-title">🔧 تسجيل الدخول</div>

  <div class="field">
    <label>اسم المستخدم</label>
    <input id="username" placeholder="Username" autocomplete="username">
  </div>

  <div class="field">
    <label>كلمة المرور</label>
    <input id="password" type="password" placeholder="Password" autocomplete="current-password">
    <span class="toggle-password" id="togglePassword">👁️</span>
  </div>

  <button class="btn-login" onclick="login()">دخول</button>
  <button id="installBtn" class="btn-install">📲 تثبيت التطبيق على الهاتف</button>
  <button class="btn-test" onclick="testLocalNotif()">🧪 اختبار محلي</button>
</div>

<script>
const EMAIL_DOMAIN = '@nahdetmisr.com';

const firebaseConfig = {
 apiKey: "AIzaSyDZ1RAn4fIN6Rqc-b5-BoHiiNFQ9GvZZJA",
  authDomain: "parts-7e82e.firebaseapp.com",
  projectId: "parts-7e82e",
  storageBucket: "parts-7e82e.firebasestorage.app",
  messagingSenderId: "198514736431",
  appId: "1:198514736431:web:3e88fb478f4cfc910035da"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// 🛡️ دالة تعقيم المدخلات (XSS Protection)
function escapeHTML(str) {
  if (!str || typeof str !== 'string') return str;
  return str.replace(/[&<>'"]/g, function(match) {
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[match];
  });
}

// 👁️ إظهار وإخفاء الباسورد
document.getElementById('togglePassword').addEventListener('click', function() {
  const passInput = document.getElementById('password');
  if (passInput.type === 'password') {
    passInput.type = 'text';
    this.textContent = '🙈';
  } else {
    passInput.type = 'password';
    this.textContent = '👁️';
  }
});

auth.onAuthStateChanged(user => {
  if (user && localStorage.getItem('user')) {
    location.href = (typeof REQUESTS_ENABLED !== 'undefined' && REQUESTS_ENABLED) ? 'request.html' : 'parts.html';
  } else {
    document.getElementById("loading").style.display = "none";
    document.getElementById("loginForm").style.display = "block";
  }
});

async function login() {
  const loginBtn = document.querySelector('.btn-login');
  let u = document.getElementById('username').value.trim().toLowerCase();
  let p = document.getElementById('password').value.trim();

  // تعقيم المدخلات قبل المعالجة
  u = escapeHTML(u);
  p = escapeHTML(p);

  if (!u || !p) { alert('اكتب اسم المستخدم وكلمة المرور ❌'); return; }

  loginBtn.disabled = true;
  loginBtn.textContent = 'بيدخل...';

  try {
    const email = u.includes('@') ? u : u + EMAIL_DOMAIN;
    await auth.signInWithEmailAndPassword(email, p);

    // تخزين اسم المستخدم بشكل آمن
    const username = email.split('@')[0];
    localStorage.setItem('user', username);
    
    location.href = (typeof REQUESTS_ENABLED !== 'undefined' && REQUESTS_ENABLED) ? 'request.html' : 'parts.html';

  } catch (e) {
    console.error(e);
    if (e.code === 'auth/invalid-credential' || e.code === 'auth/user-not-found' || e.code === 'auth/wrong-password') {
      alert('بيانات غلط ❌');
    } else if (e.code === 'auth/too-many-requests') {
      alert('محاولات كتير غلط، حاول تاني بعد شوية ⏳');
    } else {
      alert('حصل خطأ غير متوقع، جرّب تاني');
    }
  } finally {
    loginBtn.disabled = false;
    loginBtn.textContent = 'دخول';
  }
}

document.querySelectorAll('input').forEach(inp =>
  inp.addEventListener('keypress', e => { if (e.key === 'Enter') login(); })
);

async function testLocalNotif() {
  if (!('serviceWorker' in navigator)) { alert('متصفحك لا يدعم الإشعارات'); return; }
  const reg = await navigator.serviceWorker.getRegistration();
  if (!reg) { alert('Service Worker مش مسجّل'); return; }
  reg.showNotification('🧪 اختبار محلي', {
    body: 'الإشعارات المحلية شغّالة ✅',
    icon: '/icon-192.png',
    vibrate: [200,100,200]
  });
}

// 📲 كود تثبيت التطبيق (PWA)
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  // إظهار زر التثبيت
  document.getElementById('installBtn').style.display = 'block';
});

document.getElementById('installBtn').addEventListener('click', async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    if (outcome === 'accepted') {
      document.getElementById('installBtn').style.display = 'none';
    }
    deferredPrompt = null;
  }
});
</script>
</body>
</html>
