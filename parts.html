<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تتبع قطع الغيار</title>
<!-- [إضافة مكتبات Firebase كما هي في ملفك الأصلي] -->
<style>
    /* [نفس التنسيقات الخاصة بك] */
</style>
</head>
<body>
<!-- [نفس الهيكل HTML الخاص بك] -->

<script>
// إعدادات Firebase
const firebaseConfig = { /* بياناتك */ };
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const currentUser = localStorage.getItem("user");

// دالة إرسال الإشعار (تُستخدم فقط عند إضافة قطعة جديدة يدوياً)
async function sendNotificationToAll(title, body) {
  try {
    await fetch('/api/notify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, body })
    });
  } catch(e) { console.error("Notification trigger error"); }
}

async function addPart() {
  const name = document.getElementById("partName").value.trim();
  if (!name) return;

  const newPart = {
    name,
    machine: document.getElementById("partMachine").value,
    stage: 0,
    createdAt: new Date(),
    createdBy: currentUser,
    reminderValue: parseInt(document.getElementById("reminderValue").value) || 7,
    reminderUnit: document.getElementById("reminderUnit").value,
    lastNotifiedDate: null // مفتاح مهم جداً للـ Cron Job
  };

  await db.collection("parts").add(newPart);
  await sendNotificationToAll("جديد", `تم إضافة قطعة ${name} — ${newPart.machine}`);
  showToast("تم الحفظ بنجاح");
}

function showToast(msg) { /* كود التوست الخاص بك */ }
function logout() { localStorage.clear(); location.href = "index.html"; }
</script>
</body>
</html>
