<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تتبع قطع الغيار</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-messaging.js"></script>

<style>
:root { --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a; --border: #2e3250; --accent: #f59e0b; --accent2: #3b82f6; --text: #e8eaf0; --muted: #7b82a0; --danger: #ef4444; --success: #22c55e; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Cairo', Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.header-title { font-size: 18px; font-weight: 700; color: var(--accent); }
.header-nav { display: flex; gap: 8px; }
.btn-nav { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 7px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; text-decoration: none; }
.notif-status { font-size: 11px; padding: 4px 10px; border-radius: 20px; font-weight: 600; }
.notif-on { background: #22c55e22; color: #22c55e; border: 1px solid #22c55e44; }
.notif-off { background: #ef444422; color: #ef4444; border: 1px solid #ef444444; }
.main { padding: 20px; max-width: 1100px; margin: 0 auto; }
.add-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px; margin-bottom: 24px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.full { grid-column: 1 / -1; }
label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; }
input, select, textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 10px 12px; border-radius: 8px; outline: none; }
.btn-add { background: var(--accent); color: #000; border: none; padding: 11px 28px; border-radius: 8px; font-weight: 700; cursor: pointer; }
.parts-list { display: flex; flex-direction: column; gap: 12px; }
.part-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
.part-card-header { display: flex; align-items: center; gap: 10px; padding: 14px 18px; cursor: pointer; }
.part-body { display: none; padding: 0 18px 18px; border-top: 1px solid var(--border); }
.part-card.expanded .part-body { display: block; }
#toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--success); color: #fff; padding: 12px 24px; border-radius: 10px; z-index: 9999; transition: transform .3s; }
#toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>

<body>

<div class="header">
  <div class="header-title">🔩 تتبع قطع الغيار</div>
  <div class="header-nav">
    <span class="notif-status notif-off" id="notifBadge">🔕 إشعارات</span>
    <button class="btn-nav" onclick="logout()">خروج</button>
  </div>
</div>

<div class="main">
  <div class="add-card" id="addSection">
    <h3>➕ تسجيل قطعة غيار</h3>
    <div class="form-grid">
      <div><label>اسم القطعة *</label><input id="partName"></div>
      <div><label>الماكينة *</label><select id="partMachine"><option>Web 7</option><option>Web 8</option></select></div>
    </div>
    <button class="btn-add" id="addBtn" onclick="addPart()">📤 تسجيل الإخراج</button>
  </div>
  <div id="partsList" class="parts-list"></div>
</div>

<div id="toast"></div>

<script>
const firebaseConfig = { /* ضع بياناتك هنا */ };
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const messaging = firebase.messaging();
const currentUser = localStorage.getItem("user");

// دالة إرسال الإشعارات (تستخدم فقط عند إضافة أو تحديث)
async function sendNotificationToAll(title, body) {
  try {
    const response = await fetch('/api/notify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, body }) // سيرفر Vercel سيقوم بتوزيعها
    });
    console.log("Notification trigger sent to Vercel");
  } catch(e) {
    console.error("Failed to send notification", e);
  }
}

// تسجيل الـ Token لمرة واحدة فقط
async function startNotifications() {
  try {
    const registration = await navigator.serviceWorker.register('/firebase-messaging-sw.js');
    const token = await messaging.getToken({
      vapidKey: 'BLeQCahZDRsoXPJUFE3SshG7hMHzqPeVts8SG3b4b526BENvcerNez7htoPy03CQtI1GZYOUBFJd0Ddz1l4biuc',
      serviceWorkerRegistration: registration
    });
    await db.collection("tokens").doc(token).set({ token, user: currentUser, createdAt: new Date() });
    document.getElementById("notifBadge").className = "notif-status notif-on";
    document.getElementById("notifBadge").innerText = "🔔 إشعارات مفعّلة";
  } catch(e) { console.log(e); }
}

startNotifications();

async function addPart() {
  const name = document.getElementById("partName").value;
  const machine = document.getElementById("partMachine").value;
  if (!name) return;

  await db.collection("parts").add({ name, machine, stage: 0, createdAt: new Date(), createdBy: currentUser });
  
  // إرسال إشعار واحد فقط عند الإضافة
  await sendNotificationToAll("جديد", `تم إضافة قطعة ${name} بواسطة ${currentUser}`);
  showToast("تم الحفظ");
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3000);
}

function logout() { localStorage.clear(); location.href = "index.html"; }
</script>
</body>
</html>
