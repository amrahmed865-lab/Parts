<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>طلب صيانة</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff0000">
<style>
body { font-family:Arial; direction:rtl; text-align:center; background:#f2f2f2; }
.container { background:white; padding:20px; margin:50px auto; width:300px; border-radius:10px; }
select, textarea { width:100%; margin:10px 0; padding:10px; }
button { background:red; color:white; padding:15px; border:none; width:100%; margin-top:5px; cursor:pointer; }
#preview { width:100%; margin-top:10px; display:none; border-radius:8px; }
</style>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-messaging.js"></script>
<script src="notif-helper.js"></script>
<script src="app-config.js"></script>

</head>
<body>
<div class="container">
<h2>بلاغ عطل</h2>
<button onclick="logout()" style="background:black;">Logout</button>

<select id="machine">
  <option>Web 7</option>
  <option>Web 8</option>
  <option>Web 9</option>
</select>

<select id="type">
  <option>Electrical</option>
  <option>Mechanical</option>
  <option>Emergency</option>
</select>

<textarea id="desc" placeholder="اكتب وصف العطل"></textarea>

<input type="file" id="photo" accept="image/*" capture="environment">
<img id="preview">
<button id="retakeBtn" style="display:none;background:orange;">إعادة التصوير</button>
<button id="deleteBtn" style="display:none;background:#555;">حذف الصورة</button>
<button id="sendBtn">إرسال</button>

<a href="#" onclick="goDashboard(event)"><button style="background:blue;">عرض الطلبات</button></a>
<a href="parts.html"><button style="background:#6366f1;">🔩 تتبع قطع الغيار</button></a>
</div>

<script>
const user        = localStorage.getItem('user');
const role        = localStorage.getItem('role');
const userMachine = localStorage.getItem('machine');
const canEdit     = (user === 'ahmed' || user === 'amr');

if (!role) location.href = 'index.html';
if (!REQUESTS_ENABLED) {
  alert('خدمة طلبات الصيانة متوقفة مؤقتاً ⏸️');
  location.href = 'parts.html';
  throw new Error('REQUESTS_DISABLED'); // وقف تنفيذ باقي الكود
}

const firebaseConfig = {
  apiKey:            'AIzaSyCk-sP0Z-TGyx1rcyQhXFR1D52BY-aLt1E',
  authDomain:        'maintenance-nahda.firebaseapp.com',
  projectId:         'maintenance-nahda',
  storageBucket:     'maintenance-nahda.firebasestorage.app',
  messagingSenderId: '1055981144653',
  appId:             '1:1055981144653:web:cecf0a83969248f7d12a04'
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ── تفعيل FCM فور الدخول ──
initFCM(db);

const machineEl  = document.getElementById('machine');
const sendBtn    = document.getElementById('sendBtn');
const photoInput = document.getElementById('photo');
const preview    = document.getElementById('preview');
const retakeBtn  = document.getElementById('retakeBtn');
const deleteBtn  = document.getElementById('deleteBtn');

if (!canEdit) { machineEl.value = userMachine; machineEl.disabled = true; }

photoInput.addEventListener('change', () => {
  const file = photoInput.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    preview.src = e.target.result;
    preview.style.display = 'block';
    retakeBtn.style.display = 'block';
    deleteBtn.style.display = 'block';
  };
  reader.readAsDataURL(file);
});

retakeBtn.onclick = () => {
  photoInput.value = '';
  preview.style.display = retakeBtn.style.display = deleteBtn.style.display = 'none';
  photoInput.click();
};

deleteBtn.onclick = () => {
  photoInput.value = '';
  preview.src = '';
  preview.style.display = retakeBtn.style.display = deleteBtn.style.display = 'none';
};

async function sendRequest() {
  const type    = document.getElementById('type').value;
  const desc    = document.getElementById('desc').value;
  const machine = canEdit ? machineEl.value : userMachine;

  if (!desc.trim()) { alert('اكتب وصف العطل'); return; }

  sendBtn.disabled = true;
  sendBtn.innerText = 'جاري الإرسال...';

  try {
    await db.collection('requests').add({
      machine, type,
      description: desc,
      image: '',
      time: new Date(),
      status: 'open',
      tech: '',
      comment: '',
      user
    });

    // ── إشعار لكل المستخدمين ──
    await sendNotificationToAll(
      db,
      '🔧 طلب صيانة جديد',
      `${user} أضاف طلب للماكينة ${machine} — ${type}`
    );

    alert('تم الإرسال ✅');
    document.getElementById('desc').value = '';
    deleteBtn.onclick();
  } catch(e) {
    alert(e.message);
  }

  sendBtn.disabled = false;
  sendBtn.innerText = 'إرسال';
}

sendBtn.addEventListener('click', sendRequest);
window.logout = () => { localStorage.clear(); location.href = 'index.html'; };

function goDashboard(e) {
  e.preventDefault();
  if (!DASHBOARD_ENABLED) {
    alert('لوحة التحكم متوقفة مؤقتاً ⏸️');
    return;
  }
  location.href = 'dashboard.html';
}
</script>
</body>
</html>
